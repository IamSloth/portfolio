.section-label { font-size:14px; font-weight:600; margin:24px 0 8px; padding:4px 0; border-bottom:1px solid #333; color:#aaa; }
.stats { display:flex; gap:16px; margin-bottom:20px; }

.modal-body { padding:20px 24px; overflow-y:auto; flex:1; }

.modal-body li { margin:2px 0; line-height:1.5; }
.modal-body table { border-collapse:collapse; margin:8px 0; width:100%; }

.modal-body strong { color:#e0d8d0; }
.modal-body hr { border:none; border-top:1px solid #333; margin:12px 0; }
.modal-body blockquote { border-left:3px solid #444; padding-left:12px; color:#999; margin:8px 0; }

if (SERVER_MODE) document.getElementById("stopBtn").style.display = "inline-block";

function stopServer() {
  if (!confirm("서버를 종료할까요?")) return;
  fetch("/api/stop").then(() => {
    badge.textContent = "서버 종료됨";
    badge.className = "mode-badge mode-file";
    document.getElementById("stopBtn").style.display = "none";
    showToast("서버 종료됨");
  });
}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove("show"), 1500);
}

function openFolder(relPath) {
  if (SERVER_MODE) {
    fetch("/api/open?path=" + encodeURIComponent("applications/" + relPath))
      .then(r => r.json())
      .then(() => showToast("📂 폴더 열림"))
      .catch(() => showToast("❌ 서버 오류"));
  } else {
    const winPath = (BASE + "/applications/" + relPath).replace(/\//g, "\\");
    navigator.clipboard.writeText(winPath).then(() => showToast("📋 경로 복사됨 (탐색기에 붙여넣기)"));
  }
}

function openStrategy(relPath, strategyFile, title) {
  if (!strategyFile) return;
  const filePath = "applications/" + relPath + "/" + strategyFile;
  if (SERVER_MODE) {
    document.getElementById("modalTitle").textContent = title + " — " + strategyFile;
    document.getElementById("modalBody").innerHTML = "<p style='color:#888'>로딩 중...</p>";
    document.getElementById("modalOverlay").classList.add("open");
    fetch("/api/file?path=" + encodeURIComponent(filePath))
      .then(r => { if(!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => {
        document.getElementById("modalBody").innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById("modalBody").innerHTML = "<p style='color:#d06060'>파일을 찾을 수 없음</p>";
      });
  } else {
    const winPath = (BASE + "/" + filePath).replace(/\//g, "\\");
    navigator.clipboard.writeText(winPath).then(() => showToast("📋 경로 복사됨"));
  }
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
document.getElementById("updated").textContent = new Date().toLocaleDateString("ko-KR");

// Stats
const counts = {};
APPS.forEach(a => { counts[a.status] = (counts[a.status]||0) + 1; });
document.getElementById("stats").innerHTML = Object.entries(STATUS)
  .filter(([k]) => counts[k])
  .map(([k,v]) => `<div class="stat"><div class="stat-n ${v.cls}" style="background:none;padding:0">${counts[k]}</div><div class="stat-l">${v.label}</div></div>`)
  .join("");

// Filters
const filterKeys = ["passed","interview","submitted","discovered","rejected","noresponse"];
let activeFilter = null;
const filtersEl = document.getElementById("filters");
filtersEl.innerHTML = `<button class="active" data-f="all">전체</button>` +
  filterKeys.filter(k=>counts[k]).map(k => `<button data-f="${k}">${STATUS[k].label} (${counts[k]})</button>`).join("");
filtersEl.addEventListener("click", e => {
  if(!e.target.dataset.f) return;
  activeFilter = e.target.dataset.f === "all" ? null : e.target.dataset.f;
  filtersEl.querySelectorAll("button").forEach(b => b.classList.toggle("active", b === e.target));
  applyFilters();
});

// Table
const sortKey = s => { const m = s.match(/^(\d+)/); return m ? parseInt(m[1]) : 999; };
const sorted = [...APPS].sort((a,b) => {
  const na = sortKey(a.id), nb = sortKey(b.id);
  if(na !== nb) return na - nb;
  return a.id.localeCompare(b.id);
});
const tbody = document.getElementById("tbody");
tbody.innerHTML = sorted.map(a => {
  const s = STATUS[a.status] || {label:a.status, cls:""};
  let links = `<a class="folder" onclick="openFolder('${a.folder}')">폴더</a>`;
  if(a.strategy) links += ` <a class="strategy" onclick="openStrategy('${a.folder}','${a.strategy}','${a.co}')">전략</a>`;
  if(a.portfolio) {
    links += ` <a href="${PAGES_URL}/${a.portfolio}" target="_blank" class="portfolio">포폴</a>`;
  }
  return `<tr data-status="${a.status}" data-text="${a.co} ${a.pos} ${a.note} ${a.id}">
    <td>${a.id}</td>
    <td>${a.co}</td>
    <td>${a.pos}</td>
    <td><span class="s ${s.cls}">${s.label}</span></td>
    <td style="color:#888;font-size:12px">${a.note}</td>
    <td><div class="links">${links}</div></td>
  </tr>`;
}).join("");

// Search + Filter
const searchEl = document.getElementById("search");
searchEl.addEventListener("input", applyFilters);
function applyFilters() {
  const q = searchEl.value.toLowerCase();
  tbody.querySelectorAll("tr").forEach(tr => {
    const matchStatus = !activeFilter || tr.dataset.status === activeFilter;
    const matchSearch = !q || tr.dataset.text.toLowerCase().includes(q);
    tr.classList.toggle("hidden", !(matchStatus && matchSearch));
  });
}
</script>
</body>
</html>
