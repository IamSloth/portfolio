<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwoom Application Dashboard</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            height: 100vh; 
            background: #2c2c2c; 
            overflow: hidden;
            font-family: sans-serif;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .col-left {
            flex: 4; /* Resume gets 40% width */
            border-right: 4px solid #444;
            display: flex;
            flex-direction: column;
        }
        .col-right {
            flex: 6; /* Essays get 60% width */
            display: flex;
            flex-direction: column;
        }
        .row-top {
            flex: 1;
            border-bottom: 4px solid #444;
            display: flex;
            flex-direction: column;
        }
        .row-bottom {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        iframe { 
            flex: 1; 
            border: none; 
            background: white; 
            width: 100%;
            height: 100%;
        }
        .label {
            background: #820024;
            color: white;
            padding: 5px 10px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left: Resume -->
        <div class="col-left">
            <div class="label">1. 이력서 (Resume)</div>
            <iframe src="1_resume.html"></iframe>
        </div>
        
        <!-- Right: Essays -->
        <div class="col-right">
            <div class="row-top">
                <div class="label">3. 필수 항목 자소서 (Required Essay) - 3대 역량</div>
                <iframe src="3_essay_required.html"></iframe>
            </div>
            <div class="row-bottom">
                <div class="label">2. 자유 양식 자소서 (Free Essay) - 자기소개</div>
                <iframe src="2_essay_free.html"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
